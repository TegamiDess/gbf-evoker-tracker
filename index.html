<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evoker Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: sans-serif;
        background: #fdf6e3; /* Creamy blonde background */
        color: #5c4a3d;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
    }
    h1 {
        margin-bottom: 10px;
        color: #d4a373; /* Darker blonde/brown text */
        text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    select {
        padding: 8px;
        font-size: 16px;
        margin-bottom: 20px;
        border: 2px solid #a8e6cf;
        border-radius: 4px;
        background: #fff;
        color: #5c4a3d;
        outline: none;
    }
    .step {
        background: #fff;
        border-left: 6px solid #ff9f43;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    /* Alternating colors for the hair tips: Orange, Green, Blue */
    .step:nth-child(3n+1) { border-left-color: #ff9f43; }
    .step:nth-child(3n+2) { border-left-color: #a8e6cf; }
    .step:nth-child(3n) { border-left-color: #8be9fd; }

    .step h3 { margin-bottom: 8px; cursor: pointer; user-select: none; color: #d4a373; }
    .step h3:hover { color: #ff9f43; }
    .material { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .material.done span { text-decoration: line-through; opacity: 0.5; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #a8e6cf; }

    .cumulative {
        background: #fff;
        border-top: 6px solid #8be9fd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .cumulative h2 { margin-bottom: 8px; color: #d4a373; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tabs button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: #e6c280; /* Base blonde */
        color: #fff;
        font-weight: bold;
        transition: 0.2s;
    }
    .tabs button:hover { background: #d4a373; }
    .tabs button.active {
        /* The gradient of her hair tips! */
        background: linear-gradient(to right, #ff9f43, #a8e6cf, #8be9fd);
        color: #fff;
        text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
    }
  </style>
</head>

    let view = 'steps', currentEvoker;

    const saved = () => JSON.parse(localStorage.getItem('evokerTracker') || '{}');
    const save = (s) => localStorage.setItem('evokerTracker', JSON.stringify(s));

    function init() {
      const sel = document.getElementById('evokerSelect');
      for (const name of Object.keys(data.evokers)) {
        const opt = document.createElement('option');
        opt.value = opt.textContent = name;
        sel.appendChild(opt);
      }
      sel.addEventListener('change', () => { currentEvoker = sel.value; render(); });
      currentEvoker = sel.value;
      setView('steps');
    }

    function setView(v) {
      view = v;
      document.getElementById('tabSteps').className = v === 'steps' ? 'active' : '';
      document.getElementById('tabCumulative').className = v === 'cumulative' ? 'active' : '';
      render();
    }

    function toggle(key) {
      const s = saved();
      s[key] = !s[key];
      save(s);
      render();
    }

        function render() {
      const el = document.getElementById('content');
      const evoker = data.evokers[currentEvoker];
      const s = saved();

      if (view === 'steps') {
        el.innerHTML = Object.entries(evoker.steps).map(([step, mats]) =>
          `<div class="step"><h3>${step}</h3>` +
          Object.entries(mats).map(([mat, qty]) => {
            const key = `${currentEvoker}|${step}|${mat}`;
            const done = s[key] ? 'done' : '';
            // Changed div to label, moved event to onchange
            return `<label class="material ${done}" style="cursor:pointer;">
              <input type="checkbox" onchange="toggle('${key}')" ${s[key] ? 'checked' : ''}>
              <span>${mat} ×${qty.toLocaleString()}</span>
            </label>`;
          }).join('') + `</div>`
        ).join('');
      } else {
        const totals = {};
        for (const mats of Object.values(evoker.steps))
          for (const [mat, qty] of Object.entries(mats))
            totals[mat] = (totals[mat] || 0) + qty;

        el.innerHTML = `<div class="cumulative"><h2>Total Materials</h2>` +
          Object.entries(totals).map(([mat, qty]) => {
            const key = `${currentEvoker}|total|${mat}`;
            const done = s[key] ? 'done' : '';
            // Changed div to label, moved event to onchange
            return `<label class="material ${done}" style="cursor:pointer;">
              <input type="checkbox" onchange="toggle('${key}')" ${s[key] ? 'checked' : ''}>
              <span>${mat} ×${qty.toLocaleString()}</span>
            </label>`;
          }).join('') + `</div>`;
      }
    }
    init();
